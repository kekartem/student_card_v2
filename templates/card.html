<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:   #F0EEE9; --sur:  #FFFFFF; --s2:   #F7F6F3; --bd:   #DDD9D2;
  --bd2:  #E8E5DF; --t1:   #1A1814; --t2:   #4A4740; --t3:   #8A877F;
  --t4:   #B8B5AE; --acc:  #3461E8; --acc2: #EBF0FF;
  --gr:   #166534; --gr2:  #DCFCE7; --gr3:  #86EFAC;
  --ye:   #92400E; --ye2:  #FEF3C7; --ye3:  #FCD34D;
  --re:   #991B1B; --re2:  #FEE2E2; --re3:  #FCA5A5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;min-height:100vh}
/* Topbar */
.topbar{background:#141210;height:52px;display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100}
.topbar-logo{color:#fff;font-weight:700;font-size:15px;letter-spacing:-.3px;white-space:nowrap}
.topbar-search{display:flex;gap:8px;flex:1;max-width:480px;margin:0 auto}
.topbar-search input{flex:1;background:#2a2722;border:1px solid #3a3733;border-radius:8px;padding:0 12px;color:#fff;font-size:13px;font-family:'Inter',sans-serif;outline:none}
.topbar-search input::placeholder{color:#6b6760}
.topbar-search input:focus{border-color:#3461E8}
.topbar-btn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:0 16px;height:34px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.topbar-btn:hover{background:#2550d0}
.topbar-link{color:#8a8780;font-size:13px;text-decoration:none;white-space:nowrap}
.topbar-link:hover{color:#fff}

/* Layout */
.page{max-width:1200px;margin:0 auto;padding:24px 20px}
.hero{margin-bottom:20px}
.hero-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hero-name{font-size:30px;font-weight:700;line-height:1.1;letter-spacing:-.5px}
.hero-links{display:flex;gap:8px;align-items:center}
.hero-btn{display:inline-flex;align-items:center;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap}
.hero-btn-amo{background:var(--acc2);color:var(--acc);border:1px solid #c8d7fa}
.hero-btn-amo:hover{background:#dde8ff}
.hero-btn-lms{background:#f3f0ff;color:#5b21b6;border:1px solid #c4b5fd}
.hero-btn-lms:hover{background:#ede9fe}
.columns{display:grid;grid-template-columns:300px 1fr;gap:20px}
@media(max-width:860px){.columns{grid-template-columns:1fr}}

/* Panels */
.panel{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:16px}
.panel-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:14px}

/* Key-value table */
.kv-table{width:100%;border-collapse:collapse}
.kv-table tr{border-bottom:1px solid var(--bd2)}
.kv-table tr:last-child{border-bottom:none}
.kv-table td{padding:7px 0;vertical-align:top}
.kv-table td:first-child{color:var(--t3);width:110px;font-size:12px;padding-right:8px}
.kv-table a{color:var(--acc);text-decoration:none;font-size:12px}

/* Big numbers grid */
.big-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.big-num-box{background:var(--s2);border:1px solid var(--bd2);border-radius:10px;padding:12px 10px;text-align:center}
.big-num-val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;line-height:1;color:var(--t1)}
.big-num-label{font-size:11px;color:var(--t3);margin-top:4px}
.tooltip-wrap{position:relative;display:inline-flex;align-items:center;gap:4px}
.tooltip-wrap .tip-icon{color:var(--t4);cursor:default;font-size:12px}
.tooltip-wrap:hover .tip-box{display:block}
.tip-box{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1A1814;color:#fff;font-size:12px;line-height:1.4;padding:8px 10px;border-radius:8px;width:200px;z-index:200;pointer-events:none;white-space:normal;text-align:left;text-transform:none;letter-spacing:0;font-weight:400}
.tip-box::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1A1814}

/* Small boxes grid */
.small-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.small-box{background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:10px}
.small-box-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--t1)}
.small-box-label{font-size:11px;color:var(--t3);margin-top:2px}

/* Class level */
.class-level-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-green{background:var(--gr2);color:var(--gr);border:1px solid var(--gr3)}
.badge-yellow{background:var(--ye2);color:var(--ye);border:1px solid var(--ye3)}
.badge-red{background:var(--re2);color:var(--re);border:1px solid var(--re3)}
.class-detail-table{width:100%;border-collapse:collapse}
.class-detail-table tr{border-bottom:1px solid var(--bd2)}
.class-detail-table tr:last-child{border-bottom:none}
.class-detail-table td{padding:5px 0;font-size:12px}
.class-detail-table td:first-child{color:var(--t3);width:90px}

/* Rate cards */
.rate-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.rate-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:18px}
.rate-label{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:6px;margin-bottom:8px}
.rate-val{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:600;line-height:1}
.rate-bar-wrap{height:4px;background:var(--bd2);border-radius:4px;margin-top:10px;overflow:hidden}
.rate-bar{height:100%;border-radius:4px;transition:width .4s}

/* Academic zones row */
.zones-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
.zone-card{background:var(--sur);border:2px solid var(--bd);border-radius:14px;padding:16px;cursor:pointer;transition:border-color .2s,box-shadow .2s;user-select:none}
.zone-card:hover{border-color:#aaa}
.zone-card.active-zone{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc2)}
.zone-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.zone-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3)}
.zone-label-wrap{display:flex;align-items:center;gap:5px}
.zone-tip-wrap{position:relative;font-size:11px;color:var(--t4);cursor:default;line-height:1}
.zone-tip-wrap:hover .zone-tip-box{display:block}
.zone-tip-box{display:none;position:absolute;bottom:calc(100% + 6px);left:0;background:#1A1814;color:#fff;font-size:12px;font-weight:400;line-height:1.5;padding:10px 12px;border-radius:8px;width:240px;z-index:300;pointer-events:none;text-transform:none;letter-spacing:0;white-space:normal}
.zone-tip-box::after{content:'';position:absolute;top:100%;left:10px;border:5px solid transparent;border-top-color:#1A1814}
.zone-level-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
.zone-score{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;line-height:1;margin-bottom:4px}
.zone-score-sub{font-size:12px;color:var(--t3)}
.zone-hint{font-size:12px;color:var(--t2);line-height:1.4;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd2)}
.zone-hint-tabs{display:flex;gap:6px;margin-bottom:10px}
.hint-tab{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;cursor:pointer;background:var(--s2);color:var(--t3);border:1px solid var(--bd2)}
.hint-tab.active{background:var(--acc2);color:var(--acc);border-color:#c8d7fa}
.hint-content{font-size:13px;line-height:1.5;color:var(--t2)}

/* Checkboxes block */
.cb-block{background:var(--sur);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;margin-bottom:20px}
.cb-block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cb-block-title{font-size:13px;font-weight:600;color:var(--t1)}
.cb-block-hint{font-size:12px;color:var(--t3)}
.cb-zones-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.cb-zone-group{padding:12px 14px}
.cb-zone-group:nth-child(odd){border-right:1px solid var(--bd2)}
.cb-zone-group:nth-child(n+3){border-top:1px solid var(--bd2)}
.cb-zone-group:last-child:nth-child(odd){grid-column:1/-1;border-right:none}
.cb-zone-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.cb-zone-label .zone-icon{font-size:13px}
.cb-items{display:flex;flex-direction:column;gap:3px}
.cb-item{display:flex;align-items:flex-start;gap:7px;padding:4px 8px;border-radius:6px;border:1px solid transparent;transition:background .15s,border-color .15s,opacity .15s}
.cb-item.w2{border-left:2px solid var(--gr3)}
.cb-item.w1{border-left:2px solid var(--ye3)}
.cb-item.wn{border-left:2px solid var(--re3)}
.cb-item-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.cb-item.w2 .cb-item-dot{background:var(--gr)}
.cb-item.w1 .cb-item-dot{background:#d97706}
.cb-item.wn .cb-item-dot{background:var(--re)}
.cb-item-text{font-size:12px;color:var(--t2);line-height:1.35}
/* highlighted state */
.cb-item.highlighted{background:var(--acc2);border-color:#c8d7fa}
.cb-item.highlighted .cb-item-text{color:var(--acc);font-weight:500}
/* dimmed state */
.cb-item.dimmed{opacity:.28}

/* Growth zones */
.growth-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.growth-card{background:var(--re2);border:1px solid var(--re3);border-radius:12px;padding:16px}
.growth-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--re);margin-bottom:10px}
.growth-items{display:flex;flex-direction:column;gap:6px}
.growth-item{font-size:12px;color:#7f1d1d;line-height:1.4;display:flex;gap:6px}
.growth-item::before{content:'●';flex-shrink:0;font-size:8px;margin-top:4px}

/* Bottom row */
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.motivators-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:16px}
.motivator-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.motivator-tag{background:var(--acc2);color:var(--acc);border:1px solid #c8d7fa;border-radius:8px;padding:6px 12px}
.motivator-tag-title{font-size:12px;font-weight:700}
.motivator-tag-desc{font-size:11px;color:var(--t3);margin-top:2px}
.parent-card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:16px}
.parent-value{font-size:13px;line-height:1.4;padding:10px 12px;border-radius:8px;margin-top:10px}

/* Survey incomplete notice */
.notice-yellow{background:var(--ye2);border:1px solid var(--ye3);border-radius:12px;padding:18px 20px;color:var(--ye);font-size:14px;margin-bottom:20px}
.notice-yellow strong{font-weight:700}

/* Empty / loading states */
.empty-state{text-align:center;padding:80px 20px;color:var(--t3)}
.empty-state h2{font-size:20px;font-weight:600;color:var(--t2);margin-bottom:8px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">Student Card</span>
  <div class="topbar-search">
    <input type="text" id="amoInput" placeholder="AMO ID (e.g. 69c92748dcb57fafabddbfd0)" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="topbar-btn" onclick="doSearch()">Find</button>
  </div>
  <a class="topbar-link" href="/survey">Tutor Survey →</a>
</div>

<div class="page">
  <div id="root">
    <div class="empty-state">
      <h2>Enter an AMO ID to load a student card</h2>
      <p>Paste the AMO contact ID in the search field above</p>
    </div>
  </div>
</div>

<script>
let currentData = null;
let activeZone = null; // 'potential' | 'progress' | 'engagement' | null
let activeHintTab = {}; // zone → tab

async function doSearch(){
  const val = document.getElementById('amoInput').value.trim();
  if(!val) return;
  const root = document.getElementById('root');
  root.innerHTML = '<div class="empty-state"><span class="spinner"></span> Loading…</div>';
  try {
    const lu = await fetch(`/api/card/lookup?amo_id=${encodeURIComponent(val)}`);
    if(!lu.ok){ const e=await lu.json(); root.innerHTML=`<div class="empty-state"><h2>Not found</h2><p>${e.error||''}</p></div>`; return; }
    const lu_data = await lu.json(); const {student_id} = lu_data;
    const dr = await fetch(`/api/card/${student_id}`);
    if(!dr.ok){ root.innerHTML='<div class="empty-state"><h2>Error loading card</h2></div>'; return; }
    currentData = await dr.json();
    currentData._lms_id = lu_data.lms_id;
    activeZone = null;
    activeHintTab = {};
    renderCard();
  } catch(err){
    root.innerHTML=`<div class="empty-state"><h2>Error</h2><p>${err.message}</p></div>`;
  }
}

function renderCard(){
  const d = currentData;
  const s = d.service, sl = d.sales, ac = d.academic;

  // price/lesson
  const pkg = sl.last_package_check || {};
  const ppl = pkg.paid_classes && pkg.amount ? (pkg.amount / pkg.paid_classes).toFixed(0) : '—';

  const classLevelBadge = {high:'badge-green',middle:'badge-yellow',low:'badge-red'}[sl.class_level] || 'badge-yellow';
  const classLevelText  = {high:'High',middle:'Middle',low:'Low'}[sl.class_level] || sl.class_level;

  const details = sl.class_details || {};

  document.getElementById('root').innerHTML = `
  <!-- HERO -->
  <div class="hero">
    <div class="hero-row">
      <div class="hero-name">${s.student_name || '—'}</div>
      <div class="hero-links">
        ${s.amo_link ? `<a class="hero-btn hero-btn-amo" href="${s.amo_link}" target="_blank">AMO ↗</a>` : ''}
        <a class="hero-btn hero-btn-lms" href="https://lms.algonova.id/student/default/update/${currentData._lms_id||''}" target="_blank">LMS ↗</a>
      </div>
    </div>
  </div>

  <div class="columns">
    <!-- LEFT SIDEBAR -->
    <div>
      <!-- Service panel -->
      <div class="panel">
        <div class="panel-title">Service</div>
        <table class="kv-table">
          <tr><td>Student</td><td>${s.student_name||'—'}</td></tr>
          <tr><td>Age</td><td>${s.age||'—'}</td></tr>
          <tr><td>Course</td><td>${s.current_course||'—'}</td></tr>
          <tr><td>Tutor</td><td>${s.tutor_name||'—'}</td></tr>
        </table>
      </div>

      <!-- Sales panel -->
      <div class="panel">
        <div class="panel-title">Sales</div>
        <div class="big-nums">
          <div class="big-num-box">
            <div class="big-num-val">${sl.total_lessons??'—'}</div>
            <div class="big-num-label">Total lessons</div>
          </div>
          <div class="big-num-box">
            <div class="tooltip-wrap">
              <div class="big-num-val">${sl.prolongations??'—'}</div>
              <span class="tip-icon">ⓘ<span class="tip-box">Number of prolongations before the one you are preparing for</span></span>
            </div>
            <div class="big-num-label">Prolongations</div>
          </div>
          <div class="big-num-box">
            <div class="big-num-val">$${ppl}</div>
            <div class="big-num-label">Price / lesson</div>
          </div>
        </div>
        <div class="small-grid">
          <div class="small-box">
            <div class="small-box-val">${pkg.paid_classes??'—'}</div>
            <div class="small-box-label">Classes at last check</div>
          </div>
          <div class="small-box">
            <div class="small-box-val">${pkg.amount?'$'+pkg.amount:'—'}</div>
            <div class="small-box-label">Amount paid</div>
          </div>
          <div class="small-box">
            <div class="small-box-val">${pkg.date||'—'}</div>
            <div class="small-box-label">Last check date</div>
          </div>
          <div class="small-box">
            <div class="small-box-val" style="text-transform:capitalize">${sl.class_type||'—'}</div>
            <div class="small-box-label">Format</div>
          </div>
        </div>

        <div class="class-level-header">
          <div class="panel-title tooltip-wrap" style="margin-bottom:0">
            Class level
            <span class="tip-icon">ⓘ<span class="tip-box">From TCM profiling. If the client has high class, it makes sense to offer more courses or more packages. If the class is low — push on empathy and good things about student.</span></span>
          </div>
          <span class="badge ${classLevelBadge}">${classLevelText}</span>
        </div>
        <table class="class-detail-table">
          <tr><td>Device</td><td>${details.device_type||'—'}</td></tr>
          <tr><td>Extra lessons</td><td>${details.additional_lessons||'—'}</td></tr>
          <tr><td>Parent job</td><td>${details.parents_profession||'—'}</td></tr>
          <tr><td>School</td><td>${details.school||'—'}</td></tr>
          <tr><td>Home bg</td><td>${details.home_background||'—'}</td></tr>
          <tr><td>Parent comm</td><td>${details.parents_communication||'—'}</td></tr>
        </table>
      </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div id="academic-col">
      ${renderAcademic(ac, d.survey_complete, d.survey_last_step)}
    </div>
  </div>
  `;
}

function renderAcademic(ac, complete, lastStep){
  if(!complete){
    const steps = ['Comprehension','Independence','Attention','Stability','Motivation','Motivators','Parent'];
    const done = lastStep + 1;
    return `
    <div class="notice-yellow">
      <strong>Survey not yet complete</strong> — the tutor has completed ${done} of 7 zones.
      <br><br>Ask the tutor to finish the survey at <a href="/survey" style="color:inherit;font-weight:700">/survey</a> to unlock the academic profile.
    </div>`;
  }

  const barColor = v => v>=75?'var(--gr)':v>=50?'#d97706':'var(--re)';

  // Zone cards HTML
  const metrics = ['potential','progress','engagement'];
  const metricTooltips = {
    potential: 'Calculated based on Comprehension, Independence and Motivation. If the student has cognitive skills AND is motivated, it\'s a clear sign he is going to reach learning goals.',
    progress:  'Calculated based on Comprehension, Independence and Stability. If the kid has cognitive skills, has good Independence points and learns consistently, it\'s easy for him to show progress. This parameter is very close to the Potential parameter.',
    engagement:'Calculated based on Attention and Motivation. If the student is attentive and motivated, it means he has an urge to learn. Even if his cognitive skills are low, the urge is enough to gain knowledge.',
  };
  const metricLabels = {potential:'Potential',progress:'Progress',engagement:'Engagement'};

  const zonesHtml = metrics.map(key => {
    const m = ac[key];
    const levelColor = {high:'badge-green',medium:'badge-yellow',low:'badge-red'}[m.level];
    const isActive = activeZone === key;
    const tab = activeHintTab[key] || 'warmup';
    const tabLabels = {warmup:'Warm-up',urgency:'Urgency',objection:'Objection'};
    return `
    <div class="zone-card${isActive?' active-zone':''}" onclick="toggleZone('${key}')">
      <div class="zone-header">
        <span class="zone-label-wrap">
          <span class="zone-label">${metricLabels[key]}</span>
          <span class="zone-tip-wrap">ⓘ<span class="zone-tip-box">${metricTooltips[key]}</span></span>
        </span>
        <span class="badge ${levelColor} zone-level-badge">${m.level.charAt(0).toUpperCase()+m.level.slice(1)}</span>
      </div>
      <div class="zone-score" style="color:${m.level==='high'?'var(--gr)':m.level==='low'?'var(--re)':'var(--ye)'}">${m.score.toFixed(2)}</div>
      <div class="zone-score-sub">score (−1.0 to +1.0)</div>
      <div class="zone-hint visible">
        <div class="zone-hint-tabs">
          ${['warmup','urgency','objection'].map(t=>`<div class="hint-tab${tab===t?' active':''}" onclick="event.stopPropagation();setTab('${key}','${t}')">${tabLabels[t]}</div>`).join('')}
        </div>
        <div class="hint-content">${m.ism[tab]||''}</div>
      </div>
    </div>`;
  }).join('');

  // Build all checkboxes block
  const ZONE_DEFS = window._zoneDefs || [];
  const cbHtml = renderCheckboxBlock(ac);

  // Growth zones
  const gz = ac.growth_zones;
  let growthHtml = '';
  if(gz.zones && gz.zones.length){
    growthHtml = `
    <div class="panel-title" style="margin-bottom:12px">⚠️ Growth Zones</div>
    <div class="growth-row">
      ${gz.zones.map(z=>{
        const label = {comprehension:'Comprehension',independence:'Independence',attention:'Attention',stability:'Stability',motivation:'Motivation'}[z]||z;
        const items = (gz.red_by_zone||{})[label]||[];
        return `<div class="growth-card">
          <div class="growth-title">${label}</div>
          <div class="growth-items">${items.map(i=>`<div class="growth-item">${i}</div>`).join('')||'<div style="font-size:12px;color:#7f1d1d">No red signals selected</div>'}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Motivators & parent
  const motivatorsHtml = ac.motivators && ac.motivators.length
    ? ac.motivators.map(m=>`<div class="motivator-tag"><div class="motivator-tag-title">${m.title}</div><div class="motivator-tag-desc">${m.text}</div></div>`).join('')
    : '<span style="color:var(--t3);font-size:13px">None selected</span>';

  const parentColor = {green:'badge-green',yellow:'badge-yellow',red:'badge-red'}[ac.parent_color]||'badge-yellow';
  const parentHtml = ac.parent
    ? `<div class="parent-value" style="${ac.parent_color==='green'?'background:var(--gr2);color:var(--gr)':ac.parent_color==='red'?'background:var(--re2);color:var(--re)':'background:var(--ye2);color:var(--ye)'}">${ac.parent}</div>`
    : '<div style="color:var(--t3);font-size:13px;margin-top:10px">No selection</div>';

  return `
  <!-- Attendance / Solution rates -->
  <div class="rate-row">
    <div class="rate-card">
      <div class="rate-label tooltip-wrap">Attendance
        <span class="tip-icon">ⓘ<span class="tip-box">Attendance of the current course from LMS.</span></span>
      </div>
      <div class="rate-val" style="color:${barColor(ac.attendance_rate)}">${ac.attendance_rate}%</div>
      <div class="rate-bar-wrap"><div class="rate-bar" style="width:${ac.attendance_rate}%;background:${barColor(ac.attendance_rate)}"></div></div>
    </div>
    <div class="rate-card">
      <div class="rate-label tooltip-wrap">Solution Rate
        <span class="tip-icon">ⓘ<span class="tip-box">Green, yellow or red relative to average for all students.</span></span>
      </div>
      <div class="rate-val" style="color:${barColor(ac.solution_rate)}">${ac.solution_rate}%</div>
      <div class="rate-bar-wrap"><div class="rate-bar" style="width:${ac.solution_rate}%;background:${barColor(ac.solution_rate)}"></div></div>
    </div>
  </div>

  <!-- Zone cards: Potential / Progress / Engagement -->
  <div class="zones-row">${zonesHtml}</div>

  <!-- Checkboxes block -->
  <div id="cb-block-wrap">${cbHtml}</div>

  <!-- Growth zones -->
  ${growthHtml ? `<div class="panel">${growthHtml}</div>` : ''}

  <!-- Motivators + Parent -->
  <div class="bottom-row">
    <div class="motivators-card">
      <div class="panel-title">🎯 Motivators</div>
      <div class="motivator-tags">${motivatorsHtml}</div>
    </div>
    <div class="parent-card">
      <div class="panel-title">👨‍👩‍👦 Parent Communication</div>
      ${parentHtml}
    </div>
  </div>
  `;
}

// Which raw zones contribute to each metric
const METRIC_SOURCES = {
  potential:  ['comprehension','independence','motivation'],
  progress:   ['stability','comprehension','independence'],
  engagement: ['attention','motivation'],
};

const ZONE_LABELS = {
  comprehension:'Comprehension', independence:'Independence',
  attention:'Attention', stability:'Stability', motivation:'Motivation'
};

function renderCheckboxBlock(ac){
  if(!ac) return '';
  const byZone = {};
  ['potential','progress','engagement'].forEach(mk=>{
    const sources = (ac[mk]||{}).sources||{};
    Object.entries(sources).forEach(([label, items])=>{
      if(!items.length) return;
      const zone = items[0].zone;
      if(!byZone[zone]) byZone[zone] = new Map();
      items.forEach(it=>{
        if(!byZone[zone].has(it.text)) byZone[zone].set(it.text, it);
      });
    });
  });

  const highlightSets = {};
  ['potential','progress','engagement'].forEach(mk=>{
    const set = new Set();
    const sources = (ac[mk]||{}).sources||{};
    Object.values(sources).forEach(items=>{
      items.forEach(it=>set.add(`${it.zone}_${it.index}`));
    });
    highlightSets[mk] = set;
  });
  window._highlightSets = highlightSets;

  const zones = ['comprehension','independence','attention','stability','motivation'];
  const icons = {comprehension:'🧠',independence:'🚀',attention:'👁️',stability:'📈',motivation:'⚡'};

  let zoneGroups = '';
  zones.forEach(z=>{
    const map = byZone[z];
    if(!map || map.size===0) return;
    let items = '';
    map.forEach(it=>{
      const wClass = it.weight===2?'w2':it.weight===1?'w1':'wn';
      const key = `${z}_${it.index}`;
      let itemClass = wClass;
      if(activeZone){
        itemClass += highlightSets[activeZone]&&highlightSets[activeZone].has(key)?' highlighted':' dimmed';
      }
      items += `<div class="cb-item ${itemClass}"><div class="cb-item-dot"></div><div class="cb-item-text">${it.text}</div></div>`;
    });
    zoneGroups += `<div class="cb-zone-group"><div class="cb-zone-label"><span class="zone-icon">${icons[z]}</span>${ZONE_LABELS[z]}</div><div class="cb-items">${items}</div></div>`;
  });

  return `<div class="cb-block">
    <div class="cb-block-header">
      <div class="cb-block-title">Behavioural Signals</div>
      <div class="cb-block-hint">${activeZone ? `Highlighted: signals contributing to <strong>${activeZone.charAt(0).toUpperCase()+activeZone.slice(1)}</strong>` : 'Click a zone above to highlight contributing signals'}</div>
    </div>
    <div class="cb-zones-grid">${zoneGroups}</div>
  </div>`;
}

function toggleZone(key){
  if(activeZone===key) activeZone=null;
  else activeZone=key;
  // Update active border on zone cards
  document.querySelectorAll('.zone-card').forEach(el=>{
    const k = el.getAttribute('onclick').match(/toggleZone\('(\w+)'/);
    if(k) el.classList.toggle('active-zone', k[1]===activeZone);
  });
  // Re-render only the cb-block
  const cbWrap = document.getElementById('cb-block-wrap');
  if(cbWrap) cbWrap.innerHTML = renderCheckboxBlock(currentData.academic);
}

function setTab(zone, tab){
  activeHintTab[zone]=tab;
  const ac = currentData.academic;
  document.getElementById('academic-col').innerHTML = renderAcademic(ac, currentData.survey_complete, currentData.survey_last_step);
}
</script>
